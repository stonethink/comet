<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img" aria-label="图 1. Rubric 维度相对 0.3.9 的变化">
<style>
text { font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; }
.title { fill: #1B1A18; font-size: 18px; font-weight: 700; }
.subtitle, .tick { fill: #66615A; font-size: 12px; }
.label { fill: #1B1A18; font-size: 13px; }
.value { fill: #1B1A18; font-size: 12px; font-family: 'Cascadia Mono', Consolas, monospace; }
.grid { stroke: #D8D2C7; stroke-width: 1; shape-rendering: crispEdges; }
.axis { stroke: #1B1A18; stroke-width: 1; shape-rendering: crispEdges; }
</style>
<rect width="920" height="460" fill="#FFFFFF" />
<text class="title" x="32" y="32">图 1. Rubric 维度相对 0.3.9 的变化</text>
<text class="subtitle" x="32" y="54">横轴为当前 workflow 减去 0.3.9 基线；右侧为提升，左侧为退步。</text>
<line class="grid" x1="373.0" y1="70" x2="373.0" y2="390" />
<text class="tick" x="373.0" y="420" text-anchor="middle">-0.4</text>
<line class="grid" x1="459.0" y1="70" x2="459.0" y2="390" />
<text class="tick" x="459.0" y="420" text-anchor="middle">-0.2</text>
