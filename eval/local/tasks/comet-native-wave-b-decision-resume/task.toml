[metadata]
name = "comet-native-wave-b-decision-resume"
description = "Test one hidden product decision and a context-cleared Native resume from disk"
difficulty = "hard"
category = "comet-native"
tags = ["comet-native", "decision", "cold-resume", "multi-turn", "wave-b"]
default_treatments = ["COMET_NATIVE_PHASE1"]

[template]
required = []

[environment]
description = "Python word-count workspace with only the self-contained Comet Native Skill available."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_native_wave_b_decision_resume.py"
target_artifacts = [".cache/comet-native-eval/resume-status.json", ".cache/comet-native-eval/archive-preview.json", ".cache/comet-native-eval/archive-commit.json", "docs/comet/archive", "docs/comet/specs/unique-word-counting/spec.md"]
timeout = 120

[evaluation]
profile = "generic"
required_skills = ["comet-native"]
expected_artifacts = [".cache/comet-native-eval/resume-status.json", ".cache/comet-native-eval/archive-preview.json", ".cache/comet-native-eval/archive-commit.json", "docs/comet/archive", "docs/comet/specs/unique-word-counting/spec.md"]
require_skill_invocation = true
rubric_criteria = [
  "Surfaces exactly one user-visible token-normalization decision before Build",
  "Records the deterministic answer in the brief and complete target specification",
  "Resumes the same change from disk after context is cleared instead of relying on chat memory",
  "Implements, verifies, and commits the exact ready Archive preflight with real evidence",
]

[interaction]
mode = "auto_user"
max_turns = 4
decision_patterns = ["normalization", "punctuation", "apostrophe", "unique word"]
decision_reply = "Treat words case-insensitively, strip surrounding punctuation, and preserve internal apostrophes."
continue_prompt = "This is a context-cleared continuation. First invoke `/comet-native` so its recovery contract is loaded. After the Skill loads, the first Bash command, before any Read, Edit, test, or transition, must create .cache/comet-native-eval/ and invoke the bundled runtime command `status add-unique-counting --json`, redirecting its stdout directly to .cache/comet-native-eval/resume-status.json. Confirm that exact envelope names add-unique-counting in Build, and write it exactly once. That file is the immutable cold-resume snapshot: never overwrite or recreate it later, including after Archive. Then re-read the confirmed Native artifacts from disk and continue the same change through Verify and Archive. The first archive dry-run command must include --dry-run --json and redirect stdout directly to .cache/comet-native-eval/archive-preview.json; read data.preflightHash from that exact envelope. The first commit command must include --expect-preflight with that hash and --json, and redirect stdout directly to .cache/comet-native-eval/archive-commit.json. Do not reconstruct either archive envelope after Archive. Verify all three runtime envelopes exist before reporting completion."
fresh_resume_marker = "COMET_NATIVE_COLD_RESUME_READY"
