[metadata]
name = "comet-native-wave-f-dashboard-readonly"
description = "Test Dashboard parity with Native CLI state and prove read-only collection"
difficulty = "hard"
category = "comet-native"
tags = ["comet-native", "dashboard", "projection", "read-only", "wave-f"]
default_treatments = ["COMET_NATIVE_PHASE1"]

[template]
required = []

[environment]
description = "Passing baseline Python workspace with an active Native change visible to Dashboard."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_native_wave_f_dashboard_readonly.py"
target_artifacts = [".cache/comet-native-eval/cli-before.json", ".cache/comet-native-eval/cli-after.json", ".cache/comet-native-eval/dashboard.json", ".cache/comet-native-eval/native-tree-before.json", ".cache/comet-native-eval/native-tree-after.json"]
timeout = 120

[evaluation]
profile = "generic"
required_skills = ["comet-native"]
expected_artifacts = [".cache/comet-native-eval/cli-before.json", ".cache/comet-native-eval/cli-after.json", ".cache/comet-native-eval/dashboard.json", ".cache/comet-native-eval/native-tree-before.json", ".cache/comet-native-eval/native-tree-after.json"]
require_skill_invocation = true
rubric_criteria = [
  "Creates one active Native change with a stable CLI projection",
  "Captures the bounded Dashboard Native snapshot and matches Runtime state and continuation fields",
  "Hashes the Native artifact tree before and after Dashboard collection",
  "Demonstrates that Dashboard collection changes no Native-owned file and exposes no raw evidence",
]

[interaction]
mode = "none"
max_turns = 1
