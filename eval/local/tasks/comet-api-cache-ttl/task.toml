difficulty = "hard"
category = "comet"
tags = ["comet", "workflow", "api-design", "backward-compat"]
default_treatments = [
    "CONTROL",
    "COMET_FULL",
    "COMET_FULL_039",
]

[template]
required = []

[environment]
description = "Python in-memory cache. Claude must add TTL support via the comet workflow."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_api_cache_ttl.py"
target_artifacts = []
timeout = 120
