[metadata]
name = "comet-hotfix"
description = "Test Claude's ability to use the comet hotfix preset for a quick bug fix"
difficulty = "medium"
category = "comet"
tags = ["comet", "hotfix", "preset", "bug-fix"]
default_treatments = [
    "CONTROL",
    "COMET_FULL",
]

[template]
required = []

[environment]
description = "Python workspace with a buggy wordcount CLI. Claude must fix the bug using the comet hotfix preset."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_hotfix.py"
target_artifacts = []
timeout = 120
