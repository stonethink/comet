[metadata]
name = "comet-robust-config"
description = "Add structured error handling to a brittle INI config loader so malformed input raises clear ConfigError instead of crashing"
difficulty = "hard"
category = "comet"
tags = ["comet", "workflow", "error-handling", "robustness"]
default_treatments = [
    "CONTROL",
    "COMET_FULL",
    "COMET_FULL_039",
]

[template]
required = []

[environment]
description = "Python INI config loader with brittle error handling. Claude must add structured errors via the comet workflow."
dockerfile = "environment/Dockerfile"
timeout_sec = 900

[validation]
test_scripts = "test_robust_config.py"
target_artifacts = []
timeout = 120
