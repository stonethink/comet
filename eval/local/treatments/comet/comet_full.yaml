# Full comet skill treatment (workflow 0.4.0-beta.1, .mjs runtime)
# Injects: comet main + 7 phase sub-skills + superpowers brainstorming.
# OpenSpec CLI is provided by the task Docker image; openspec skills are not
# injected because comet-open drives `openspec new change` directly.
COMET_FULL:
  description: "Full comet skill (workflow 0.4.0-beta.1) with all sub-skills and brainstorming"
  skills:
    # Main dispatcher (carries scripts/ with the .mjs launchers + runtime bundle)
    - name: comet
      skill: comet
      variant: all
      base: benchmarks
    # Phase sub-skills (slash-invoked as /comet-open etc.)
    - name: comet-open
      skill: comet-open
      variant: all
      base: benchmarks
    - name: comet-design
      skill: comet-design
      variant: all
      base: benchmarks
    - name: comet-build
      skill: comet-build
      variant: all
      base: benchmarks
    - name: comet-verify
      skill: comet-verify
      variant: all
      base: benchmarks
    - name: comet-archive
      skill: comet-archive
      variant: all
      base: benchmarks
    - name: comet-hotfix
      skill: comet-hotfix
      variant: all
      base: benchmarks
    - name: comet-tweak
      skill: comet-tweak
      variant: all
      base: benchmarks
    # Superpowers brainstorming (comet-design deep-design dependency)
    - name: brainstorming
      skill: superpowers-brainstorming
      variant: all
      base: benchmarks
