# Full comet skill treatment (0.3.9 baseline, .sh runtime)
# Injects: the 0.3.9 Comet snapshot plus the same benchmark dependency
# snapshots used by the 0.4.0 treatment. Source dirs are prefixed
# comet-classic-039* to avoid colliding with the 0.4.0 sources, but the
# injected skill names are restored to comet/comet-open/etc. so the 0.3.9
# boilerplate `find ... */comet/scripts/comet-env.sh` resolves.
COMET_FULL_039:
  description: "0.3.9 baseline comet skill (shell runtime) with Comet, OpenSpec, and Superpowers dependencies"
  skills:
    # Main dispatcher (carries scripts/ with the frozen 0.3.9 .sh launchers)
    - name: comet
      skill: 039-release/comet-classic-039
      variant: all
      base: benchmarks
    # Phase sub-skills — source is the 0.3.9 snapshot, injected under canonical names
    - name: comet-open
      skill: 039-release/comet-classic-039-open
